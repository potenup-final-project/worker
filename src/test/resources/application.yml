spring:
  datasource:
    url: jdbc:h2:mem:worker-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379
      password: ""

LOG_SERVICE_NAME: worker

DB_URL: jdbc:h2:mem:worker-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
DB_USER: sa
DB_PASSWORD: test
DB_DDL_AUTO: create-drop
AWS_REGION: ap-northeast-2
WORKER_BATCH_SIZE: 10
WORKER_INTERVAL_MS: 1000
WORKER_MAX_ATTEMPTS: 5
WORKER_CONCURRENCY_ENDPOINT: 2
WORKER_SEND_THREAD: 2
LEASE_MINUTES: 1
SWEEP_INTERVAL_MS: 1000
HTTP_CONN_TIMEOUT: 1000
HTTP_READ_TIMEOUT: 1000
WEBHOOK_SECRET_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
WEBHOOK_ALLOW_PLAINTEXT: true
WEBHOOK_REQUIRE_HTTPS: false
WEBHOOK_LIMITER_REDIS_MAX_PERMITS: 10
WEBHOOK_LIMITER_REDIS_PERMIT_TTL_MS: 1000
WEBHOOK_LIMITER_REDIS_FAIL_OPEN: true
REDIS_HOST: localhost
REDIS_PORT: 6379
REDIS_PASSWORD: ""
WEBHOOK_SQS_ENABLED: false
WEBHOOK_SQS_QUEUE_URL: https://example.com/queue
WEBHOOK_SQS_POLL_INTERVAL_MS: 1000
WEBHOOK_SQS_MAX_MESSAGES: 10
WEBHOOK_SQS_WAIT_SECONDS: 1
WEBHOOK_SQS_VISIBILITY_TIMEOUT_SECONDS: 30
WEBHOOK_RECON_ENABLED: false
WEBHOOK_RECON_CHUNK_SIZE: 100
WEBHOOK_RECON_MAX_PAGES: 10
WEBHOOK_RECON_STALE_GRACE_MINUTES: 5
WEBHOOK_RECON_STALE_AGE_HOURS: 24
WEBHOOK_RECON_DEGRADED_WINDOW_DAYS: 7
WEBHOOK_RECON_DEGRADED_MIN_SAMPLE: 10
WEBHOOK_RECON_DEGRADED_DEAD_RATE: 0.3
WEBHOOK_RECON_DEGRADED_RECOVERY_WINDOW_DAYS: 3
WEBHOOK_RECON_MISSING_GRACE_MINUTES: 10
WEBHOOK_RECON_LOOKBACK_DAYS: 7
WEBHOOK_RECON_AUTO_DDL: false

SETTLEMENT_SQS_ENABLED: false
SETTLEMENT_SQS_QUEUE_URL: https://example.com/settlement-queue
SETTLEMENT_SQS_POLL_INTERVAL_MS: 1000
SETTLEMENT_SQS_MAX_MESSAGES: 10
SETTLEMENT_SQS_WAIT_SECONDS: 1
SETTLEMENT_SQS_VISIBILITY_TIMEOUT_SECONDS: 30

SERVER_PORT: 0
APP_LOGGING_SLOW_THRESHOLD_MS: 500

PGCORE_READ_DB_URL: jdbc:h2:mem:worker-test-read;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
PGCORE_READ_DB_USER: sa
PGCORE_READ_DB_PASSWORD: test
PGCORE_READ_DB_DRIVER: org.h2.Driver
