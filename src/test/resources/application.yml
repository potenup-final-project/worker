spring:
  datasource:
    url: jdbc:h2:mem:worker-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379
      password: ""

DB_URL: jdbc:h2:mem:worker-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
DB_USER: sa
DB_PASSWORD: ""
AWS_REGION: ap-northeast-2
WORKER_BATCH_SIZE: 10
WORKER_INTERVAL_MS: 1000
WORKER_MAX_ATTEMPTS: 5
WORKER_CONCURRENCY_ENDPOINT: 2
WORKER_SEND_THREAD: 2
LEASE_MINUTES: 1
SWEEP_INTERVAL_MS: 1000
HTTP_CONN_TIMEOUT: 1000
HTTP_READ_TIMEOUT: 1000
WEBHOOK_SECRET_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
WEBHOOK_ALLOW_PLAINTEXT: true
WEBHOOK_REQUIRE_HTTPS: false
WEBHOOK_LIMITER_REDIS_MAX_PERMITS: 10
WEBHOOK_LIMITER_REDIS_PERMIT_TTL_MS: 1000
WEBHOOK_LIMITER_REDIS_FAIL_OPEN: true
REDIS_HOST: localhost
REDIS_PORT: 6379
REDIS_PASSWORD: ""
WEBHOOK_SQS_ENABLED: false
WEBHOOK_SQS_QUEUE_URL: https://example.com/queue
WEBHOOK_SQS_POLL_INTERVAL_MS: 1000
WEBHOOK_SQS_MAX_MESSAGES: 10
WEBHOOK_SQS_WAIT_SECONDS: 1
WEBHOOK_SQS_VISIBILITY_TIMEOUT_SECONDS: 30
WEBHOOK_RECON_ENABLED: false
