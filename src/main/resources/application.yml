spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mysql://localhost:3306/pgcore
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  cloud:
    aws:
      region:
        static: ap-northeast-2
      credentials:
        access-key: test
        secret-key: test
      sqs:
        endpoint: http://localhost:9324

webhook:
  sqs:
    enabled: ${WEBHOOK_SQS_ENABLED}
    queue-url: ${WEBHOOK_SQS_QUEUE_URL:}
    poll-interval-ms: ${WEBHOOK_SQS_POLL_INTERVAL_MS}
    max-messages: ${WEBHOOK_SQS_MAX_MESSAGES}
    wait-time-seconds: ${WEBHOOK_SQS_WAIT_SECONDS}
    visibility-timeout-seconds: ${WEBHOOK_SQS_VISIBILITY_TIMEOUT_SECONDS}
  limiter:
    type: redis
    redis:
      max-permits: ${WEBHOOK_LIMITER_REDIS_MAX_PERMITS}
      permit-ttl-ms: ${WEBHOOK_LIMITER_REDIS_PERMIT_TTL_MS}
      fail-open: ${WEBHOOK_LIMITER_REDIS_FAIL_OPEN}
  worker:
    batch-size: ${WORKER_BATCH_SIZE}
    interval-ms: ${WORKER_INTERVAL_MS}
    max-attempts: ${WORKER_MAX_ATTEMPTS}
    concurrency-per-endpoint: ${WORKER_CONCURRENCY_ENDPOINT}
    send-threads: ${WORKER_SEND_THREAD}
  lease:
    minutes: ${LEASE_MINUTES}
    sweep-interval-ms: ${SWEEP_INTERVAL_MS}
  http:
    connect-timeout-ms: ${HTTP_CONN_TIMEOUT}
    read-timeout-ms: ${HTTP_READ_TIMEOUT}
  secret:
    encryption-key: ${WEBHOOK_SECRET_KEY}
    allow-plaintext-fallback: ${WEBHOOK_ALLOW_PLAINTEXT}
  endpoint:
    require-https: ${WEBHOOK_REQUIRE_HTTPS}

server:
  port: 8081

aws:
  region: ${AWS_REGION}
